services:
  - type: web
    name: case-study-api
    runtime: node
    plan: free
    buildCommand: npm ci
    startCommand: npm run start:api
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: NODE_ENV
        value: production
      - key: HOST
        value: 0.0.0.0
      - key: TRUST_PROXY
        value: 1
      - key: API_PORT
        value: 10000
      - key: MONGODB_URI
        sync: false
      - key: MONGODB_DB
        value: case_study_crm
      - key: JWT_SECRET
        sync: false
      - key: ADMIN_EMAIL
        sync: false
      - key: ADMIN_PASSWORD
        sync: false
      - key: CORS_ORIGINS
        sync: false

  - type: static_site
    name: case-study-frontend
    buildCommand: npm ci && npm run build:client
    staticPublishPath: dist
    envVars:
      - key: NODE_VERSION
        value: 22
      - key: VITE_API_URL
        sync: false
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
